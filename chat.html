<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat — Zynochat</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="seo-config.js"></script>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="header-left">
      <button id="sidebar-toggle-mobile" class="sidebar-toggle-mobile" style="margin-right: 12px; color: var(--text-1);">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      </button>
      <a href="index.html" class="logo">
        <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10 2C5.58 2 2 5.58 2 10c0 1.85.6 3.56 1.6 4.95L2.05 17.5a.5.5 0 00.63.63l2.55-1.55A7.96 7.96 0 0010 18c4.42 0 8-3.58 8-8s-3.58-8-8-8zm-3 6h6a.5.5 0 010 1H7a.5.5 0 010-1zm0 2.5h4a.5.5 0 010 1H7a.5.5 0 010-1z"/></svg>
        <span>Zyno</span>
      </a>
    </div>
    <div class="header-right">
      <a href="profile.html">
        <div class="profile-box" id="user-dp">Z</div>
      </a>
    </div>
  </div>
</header>

<div class="chat-container">
  <aside class="chat-sidebar" id="sidebar">
    <div class="sidebar-search-container">
        <input type="text" id="user-search-input" class="auth-input" placeholder="Search users..." style="margin-bottom: 0;">
        <div id="search-results-overlay" class="search-results" style="display: none;"></div>
    </div>
    <div class="contact-list" id="contact-list">
      <div class="search-item active">
        <div class="profile-box" style="width: 40px; height: 40px;">G</div>
        <div class="contact-info">
          <div style="font-weight: 600;">Global Lounge</div>
          <div style="font-size: 12px; color: var(--text-3);">Community Chat</div>
        </div>
      </div>
    </div>
  </aside>

  <main class="chat-main">
    <header class="chat-header">
      <div style="display: flex; align-items: center; gap: 12px;">
        <div class="profile-box" style="width: 40px; height: 40px;" id="chat-with-avatar">G</div>
        <div>
          <div id="chat-with-name" style="font-weight: 700;">Global Lounge</div>
          <div id="chat-with-status" style="font-size: 12px; color: var(--text-3);">Community</div>
        </div>
      </div>
    </header>

    <div class="chat-messages" id="chat-messages">
      <div class="message received">
        Welcome to the Global Lounge! Start chatting with other Zynochat users.
        <span class="message-time">System</span>
      </div>
    </div>

    <div class="chat-input-area">
      <form class="input-form" id="chat-form">
        <input type="text" id="message-input" class="message-input" placeholder="Type a message..." autocomplete="off">
        <button type="submit" class="btn-send">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
        </button>
      </form>
    </div>
  </main>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    <span>Home</span>
  </a>
  <a href="chat.html" class="nav-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span>Chats</span>
  </a>
  <a href="ai-chat.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
    <span>AI</span>
  </a>
  <a href="profile.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>Profile</span>
  </a>
  <a href="settings.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82"/></svg>
    <span>Settings</span>
  </a>
</nav>

<script src="app.js" type="module"></script>
<script>
    // Simple Sidebar Toggle for Mobile
    const toggle = document.getElementById('sidebar-toggle-mobile');
    const sidebar = document.getElementById('sidebar');
    if (toggle && sidebar) {
        toggle.onclick = () => sidebar.classList.toggle('open');
    }
</script>
</body>
</html>
