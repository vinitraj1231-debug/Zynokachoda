<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat — Zynochat</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="seo-config.js"></script>
</head>
<body class="chat-page-body">

<header class="app-header">
  <div class="header-inner">
    <div class="header-left">
      <button id="sidebar-toggle-mobile" class="sidebar-toggle-mobile" style="margin-right: 12px; color: var(--text-1);">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      </button>
      <a href="index.html" class="logo">
        <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10 2C5.58 2 2 5.58 2 10c0 1.85.6 3.56 1.6 4.95L2.05 17.5a.5.5 0 00.63.63l2.55-1.55A7.96 7.96 0 0010 18c4.42 0 8-3.58 8-8s-3.58-8-8-8zm-3 6h6a.5.5 0 010 1H7a.5.5 0 010-1zm0 2.5h4a.5.5 0 010 1H7a.5.5 0 010-1z"/></svg>
        <span>Zyno</span>
      </a>
    </div>
    <div class="header-right">
      <a href="profile.html">
        <div class="profile-box" id="user-dp">Z</div>
      </a>
    </div>
  </div>
</header>

<div class="chat-container">
  <aside class="chat-sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2 style="font-family: 'Syne'; font-size: 20px;">Chats</h2>
      <div class="sidebar-actions">
        <button class="icon-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
      </div>
    </div>

    <div class="sidebar-search-container">
        <div class="search-input-wrapper">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" id="user-search-input" placeholder="Search by username..." autocomplete="off">
        </div>
        <div id="search-results-overlay" class="search-results-dropdown" style="display: none;"></div>
    </div>

    <div class="contact-list" id="contact-list">
      <div class="contact-item active" id="global-lounge-item">
        <div class="profile-box" style="width: 48px; height: 48px; background: var(--accent-hot);">G</div>
        <div class="contact-info">
          <div class="contact-name-row">
            <span class="contact-name">Global Lounge</span>
            <span class="contact-time">Live</span>
          </div>
          <div class="contact-last-msg">Chat with everyone...</div>
        </div>
      </div>
      <!-- Contacts will be injected here -->
    </div>
  </aside>

  <main class="chat-main">
    <header class="chat-header">
      <div class="chat-header-info">
        <div class="profile-box" style="width: 44px; height: 44px;" id="chat-with-avatar">G</div>
        <div class="chat-header-text">
          <div id="chat-with-name" class="chat-name">Global Lounge</div>
          <div id="chat-with-status" class="chat-status">Community</div>
        </div>
      </div>
      <div class="chat-header-actions">
        <button class="icon-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></button>
        <button class="icon-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg></button>
      </div>
    </header>

    <div class="chat-messages" id="chat-messages">
      <!-- Messages injected by app.js -->
    </div>

    <div class="chat-input-container">
      <div class="chat-input-bar">
        <button class="icon-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg></button>
        <form id="chat-form" style="flex: 1; display: flex; gap: 10px;">
          <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
          <button type="submit" class="btn-send-circle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
          </button>
        </form>
      </div>
    </div>
  </main>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    <span>Home</span>
  </a>
  <a href="chat.html" class="nav-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span>Chats</span>
  </a>
  <a href="ai-chat.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
    <span>AI</span>
  </a>
  <a href="profile.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>Profile</span>
  </a>
  <a href="settings.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82"/></svg>
    <span>Settings</span>
  </a>
</nav>

<script src="app.js" type="module"></script>
<script>
    const toggle = document.getElementById('sidebar-toggle-mobile');
    const sidebar = document.getElementById('sidebar');
    if (toggle && sidebar) {
        toggle.onclick = () => sidebar.classList.toggle('open');
    }
</script>
</body>
</html>
