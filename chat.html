<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat — Zynochat</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    :root {
      --sidebar-w: 320px;
    }
    body {
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .chat-container {
      flex: 1;
      display: flex;
      height: calc(100vh - var(--nav-h));
      position: relative;
    }
    /* Sidebar */
    .chat-sidebar {
      width: var(--sidebar-w);
      background: var(--bg-1);
      border-right: 1px solid var(--border-1);
      display: flex;
      flex-direction: column;
      z-index: 10;
    }
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border-1);
    }
    .search-wrap {
      background: var(--bg-2);
      border-radius: var(--radius-s);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .search-input {
      background: none;
      border: none;
      color: var(--text-1);
      font-size: 14px;
      width: 100%;
    }
    .search-input:focus { outline: none; }

    .contact-list {
      flex: 1;
      overflow-y: auto;
    }
    .contact-item {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: background var(--t-fast);
      border-bottom: 1px solid rgba(255,255,255,0.02);
    }
    .contact-item:hover, .contact-item.active {
      background: var(--bg-card);
    }
    .contact-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--grad-brand);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .contact-info {
      flex: 1;
      min-width: 0;
    }
    .contact-name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .contact-last-msg {
      font-size: 13px;
      color: var(--text-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Main Chat Area */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-0);
      position: relative;
    }
    .chat-header {
      height: 64px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-1);
      background: rgba(5,5,14,0.8);
      backdrop-filter: blur(10px);
    }
    .chat-messages {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: var(--radius-m);
      font-size: 14.5px;
      position: relative;
    }
    .message.received {
      align-self: flex-start;
      background: var(--bg-2);
      border-bottom-left-radius: 4px;
    }
    .message.sent {
      align-self: flex-end;
      background: var(--accent-v);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message-time {
      font-size: 10px;
      opacity: 0.6;
      margin-top: 4px;
      display: block;
      text-align: right;
    }

    .chat-input-area {
      padding: 16px 24px;
      background: var(--bg-1);
      border-top: 1px solid var(--border-1);
    }
    .input-form {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .message-input {
      flex: 1;
      background: var(--bg-2);
      border: 1px solid var(--border-1);
      border-radius: 24px;
      padding: 10px 20px;
      color: var(--text-1);
      font-size: 14.5px;
    }
    .message-input:focus {
      outline: none;
      border-color: var(--accent-v);
    }
    .btn-send {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--grad-brand);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
      transition: transform var(--t-fast);
    }
    .btn-send:hover { transform: scale(1.05); }

    @media (max-width: 768px) {
      .chat-sidebar {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 100%;
        transform: translateX(-100%);
        transition: transform var(--t-med);
      }
      .chat-sidebar.open {
        transform: translateX(0);
      }
    }
  </style>
</head>
<body>

<nav class="nav scrolled">
  <div class="container">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10 2C5.58 2 2 5.58 2 10c0 1.85.6 3.56 1.6 4.95L2.05 17.5a.5.5 0 00.63.63l2.55-1.55A7.96 7.96 0 0010 18c4.42 0 8-3.58 8-8s-3.58-8-8-8zm-3 6h6a.5.5 0 010 1H7a.5.5 0 010-1zm0 2.5h4a.5.5 0 010 1H7a.5.5 0 010-1z"/></svg>
        </div>
        Zynochat
      </a>
      <div id="user-profile" style="display: flex; align-items: center; gap: 12px;">
        <span id="user-name" class="contact-name" style="margin-bottom:0">Loading...</span>
        <button id="logout-btn" class="btn btn-sm btn-ghost">Logout</button>
      </div>
    </div>
  </div>
</nav>

<div class="chat-container">
  <aside class="chat-sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" class="search-input" placeholder="Search messages...">
      </div>
    </div>
    <div class="contact-list" id="contact-list">
      <!-- Contacts will be populated here -->
      <div class="contact-item active">
        <div class="contact-avatar">G</div>
        <div class="contact-info">
          <div class="contact-name">Global Lounge</div>
          <div class="contact-last-msg">Welcome to Zynochat! Say hello to everyone.</div>
        </div>
      </div>
    </div>
  </aside>

  <main class="chat-main">
    <header class="chat-header">
      <div style="display: flex; align-items: center; gap: 12px;">
        <div class="contact-avatar" style="width: 40px; height: 40px;">G</div>
        <div>
          <div class="contact-name" style="margin-bottom:0">Global Lounge</div>
          <div style="font-size: 12px; color: #4ade80;">Online</div>
        </div>
      </div>
      <button class="btn btn-sm btn-secondary" id="sidebar-toggle" style="display: none;">Menu</button>
    </header>

    <div class="chat-messages" id="chat-messages">
      <!-- Messages will appear here -->
      <div class="message received">
        Welcome to the Global Lounge! Start chatting with other Zynochat users.
        <span class="message-time">10:00 AM</span>
      </div>
    </div>

    <div class="chat-input-area">
      <form class="input-form" id="chat-form">
        <input type="text" id="message-input" class="message-input" placeholder="Type a message..." autocomplete="off">
        <button type="submit" class="btn-send">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
        </button>
      </form>
    </div>
  </main>
</div>

<script src="script.js"></script>
<script src="app.js" type="module"></script>
</body>
</html>
