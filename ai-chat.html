<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Assistant — Zynochat</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .ai-chat-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding-top: 60px;
    }
    .ai-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .ai-input-area {
      padding: 16px;
      background: var(--bg-1);
      border-top: 1px solid var(--border-1);
    }
    .ai-bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14.5px;
      line-height: 1.5;
    }
    .ai-bubble.user {
      align-self: flex-end;
      background: var(--accent-v);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .ai-bubble.bot {
      align-self: flex-start;
      background: var(--bg-2);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border-1);
    }
    .typing-indicator {
      font-size: 12px;
      color: var(--text-3);
      margin-left: 16px;
      margin-bottom: 8px;
      display: none;
    }
  </style>
</head>
<body class="bg-0">

<header class="app-header">
  <div class="header-inner">
    <div class="header-left">
      <a href="index.html" style="display:flex; align-items:center; gap:8px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        <h1 class="app-logo-text">AI Assistant</h1>
      </a>
    </div>
  </div>
</header>

<div class="ai-chat-container">
  <div class="ai-messages" id="ai-messages">
    <div class="ai-bubble bot">
      Hello! I am your Zyno AI Assistant, powered by OpenRouter. How can I help you today?
    </div>
  </div>

  <div class="typing-indicator" id="ai-typing">Zyno is thinking...</div>

  <div class="ai-input-area">
    <form class="input-form" id="ai-form">
      <input type="text" id="ai-input" class="message-input" placeholder="Ask AI anything..." autocomplete="off">
      <button type="submit" class="btn-send">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
      </button>
    </form>
  </div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Home</span>
  </a>
  <a href="chat.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span>Chats</span>
  </a>
  <a href="ai-chat.html" class="nav-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
    <span>AI</span>
  </a>
  <a href="profile.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>Profile</span>
  </a>
  <a href="settings.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    <span>Settings</span>
  </a>
</nav>

<script src="app.js" type="module"></script>
</body>
</html>
