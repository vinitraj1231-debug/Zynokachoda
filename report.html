<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Report User — Zynochat</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-0">

<header class="app-header">
  <div class="header-inner">
    <div class="header-left">
      <a href="index.html" style="display:flex; align-items:center; gap:8px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        <h1 class="app-logo-text">Report</h1>
      </a>
    </div>
  </div>
</header>

<main style="padding: 80px 16px 100px;">
  <div class="form-wrap" style="max-width: 500px; margin: 0 auto;">
    <h2 class="form-title">Report User</h2>
    <p class="form-sub">Flag inappropriate behavior or spam.</p>

    <form id="report-form">
      <div class="form-group">
        <label class="form-label">Username / Handle</label>
        <input type="text" id="report-handle" class="form-input" placeholder="@username" required>
      </div>

      <div class="form-group">
        <label class="form-label">Reason</label>
        <select id="report-reason" class="form-select" required>
          <option value="">Select Reason</option>
          <option value="spam">Spam</option>
          <option value="abuse">Abuse / Harassment</option>
          <option value="impersonation">Impersonation</option>
          <option value="scam">Scam / Fraud</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Details</label>
        <textarea id="report-details" class="form-textarea" placeholder="Explain the situation..."></textarea>
      </div>

      <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 16px; background: #ff4444; border:none;">
        Submit Report
      </button>
      <p id="report-status" class="form-notice center" style="display:none;"></p>
    </form>
  </div>
</main>

    <span>Chats</span>
  </a>

  </a>
