<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Zynochat</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 40px 24px;
    }
    .auth-card {
      width: 100%;
      max-width: 400px;
      z-index: 2;
    }
    .social-btns {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }
    .btn-social {
      width: 100%;
      justify-content: center;
      background: var(--bg-0);
      border: 1px solid var(--border-1);
      color: var(--text-1);
    }
    .btn-social:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-2);
    }
    .btn-social svg {
      width: 18px;
      height: 18px;
    }
    .auth-sep {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      color: var(--text-3);
      font-size: 13px;
    }
    .auth-sep::before, .auth-sep::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-1);
    }
  </style>
</head>
<body>

<div class="auth-page">

  <div class="auth-card">
    <div class="center" style="margin-bottom: 32px;">
      <a href="index.html" class="nav-logo" style="justify-content: center;">
        <div class="logo-icon">
          <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10 2C5.58 2 2 5.58 2 10c0 1.85.6 3.56 1.6 4.95L2.05 17.5a.5.5 0 00.63.63l2.55-1.55A7.96 7.96 0 0010 18c4.42 0 8-3.58 8-8s-3.58-8-8-8zm-3 6h6a.5.5 0 010 1H7a.5.5 0 010-1zm0 2.5h4a.5.5 0 010 1H7a.5.5 0 010-1z"/></svg>
        </div>
        Zynochat
      </a>
      <h2 class="section-title" style="font-size: 28px; margin-top: 16px;">Welcome Back</h2>
      <p class="section-sub">Login to your account to continue</p>
    </div>

    <div class="form-wrap">
      <div class="social-btns">
        <button id="google-login" class="btn btn-social">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#000"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#000"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#000"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#000"/></svg>
          Continue with Google
        </button>
        <button id="github-login" class="btn btn-social">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#000"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
          Continue with GitHub
        </button>
      </div>

      <div class="auth-sep">or use email</div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="name@example.com" required>
        </div>
        <div class="form-group" id="password-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 8px;">
          Continue
        </button>
      </form>

      <form id="otp-form" style="display: none;">
        <div class="center" style="margin-bottom: 24px;">
          <h3 class="section-title" style="font-size: 20px;">Verify OTP</h3>
          <p class="section-sub">Enter the 6-digit code sent to your email</p>
        </div>
        <div class="form-group">
          <input type="text" id="otp-input" class="form-input center" placeholder="000000" maxlength="6" style="font-size: 24px; letter-spacing: 8px; font-weight: 700;" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 8px;">
          Verify & Sign In
        </button>
        <div class="center" style="margin-top: 16px;">
          <p class="form-notice">Didn't get the code? <a href="#" id="resend-otp" style="color: var(--accent-v); font-weight: 600;">Resend</a></p>
        </div>
      </form>

      <div class="center" id="toggle-auth-container" style="margin-top: 24px;">
        <p class="form-notice">
          Don't have an account? <a href="#" id="toggle-auth" style="color: var(--accent-v); font-weight: 600;">Sign up</a>
        </p>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script src="app.js" type="module"></script>
</body>
</html>
