<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Zynochat</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="seo-config.js"></script>
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="center" style="margin-bottom: 32px;">
      <a href="index.html" class="app-logo-text" style="justify-content: center; margin-bottom: 24px;">
        <div class="logo-icon-main">
          <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10 2C5.58 2 2 5.58 2 10c0 1.85.6 3.56 1.6 4.95L2.05 17.5a.5.5 0 00.63.63l2.55-1.55A7.96 7.96 0 0010 18c4.42 0 8-3.58 8-8s-3.58-8-8-8zm-3 6h6a.5.5 0 010 1H7a.5.5 0 010-1zm0 2.5h4a.5.5 0 010 1H7a.5.5 0 010-1z"/></svg>
        </div>
        Zyno
      </a>
      <h2 class="section-title" style="font-size: 28px;">Welcome Back</h2>
      <p class="section-sub">Login to your account to continue</p>
    </div>

    <div class="form-content">
      <div style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px;">
        <button id="google-login" class="btn btn-ghost" style="width: 100%; justify-content: center;">
          Continue with Google
        </button>
        <button id="github-login" class="btn btn-ghost" style="width: 100%; justify-content: center;">
          Continue with GitHub
        </button>
      </div>

      <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 24px; color: var(--text-3); font-size: 13px;">
          <div style="flex:1; height: 1px; background: var(--border-1);"></div>
          or use email
          <div style="flex:1; height: 1px; background: var(--border-1);"></div>
      </div>

      <form id="login-form">
        <input type="email" id="email" class="auth-input" placeholder="Email Address" required>
        <input type="password" id="password" class="auth-input" placeholder="Password" required>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
          Continue
        </button>
      </form>

      <form id="otp-form" style="display: none;">
        <div class="center" style="margin-bottom: 24px;">
          <h3 class="section-title" style="font-size: 20px;">Verify OTP</h3>
          <p class="section-sub">Enter the 6-digit code sent to your email</p>
        </div>
        <input type="text" id="otp-input" class="auth-input center" placeholder="000000" maxlength="6" style="font-size: 24px; letter-spacing: 8px; font-weight: 700; text-align: center;" required>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
          Verify & Sign In
        </button>
      </form>

      <div class="center" id="toggle-auth-container" style="margin-top: 24px;">
        <p style="font-size: 14px; color: var(--text-3);">
          Don't have an account? <a href="#" id="toggle-auth" style="color: var(--accent-v); font-weight: 600;">Sign up</a>
        </p>
      </div>
    </div>
  </div>

<script src="script.js"></script>
<script src="app.js" type="module"></script>
<script>
    if (typeof updateMetaTags === 'function') {
        updateMetaTags('Login', 'Sign in to your Zynochat account.');
    }
</script>
</body>
</html>
