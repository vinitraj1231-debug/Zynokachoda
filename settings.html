<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — Zynochat</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="header-left">
      <a href="index.html" class="logo">
        <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10 2C5.58 2 2 5.58 2 10c0 1.85.6 3.56 1.6 4.95L2.05 17.5a.5.5 0 00.63.63l2.55-1.55A7.96 7.96 0 0010 18c4.42 0 8-3.58 8-8s-3.58-8-8-8zm-3 6h6a.5.5 0 010 1H7a.5.5 0 010-1zm0 2.5h4a.5.5 0 010 1H7a.5.5 0 010-1z"/></svg>
        <span>Zyno</span>
      </a>
    </div>
    <div class="header-right">
      <div class="profile-box" id="user-dp">Z</div>
    </div>
  </div>
</header>

<main class="container" style="max-width: 600px;">
    <h1 style="font-family: 'Syne'; margin-bottom: 32px;">Settings</h1>

    <div style="display: grid; gap: 24px;">
        <section>
            <h3 style="font-size: 12px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;">Account</h3>
            <div class="card" style="padding: 0;">
                <div style="padding: 20px; border-bottom: 1px solid var(--border-1); display: flex; justify-content: space-between; align-items: center; cursor: pointer;">
                    <span>Notification Settings</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
                </div>
                <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer;">
                    <span>Privacy & Security</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
                </div>
            </div>
        </section>

        <section>
            <h3 style="font-size: 12px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;">Danger Zone</h3>
            <button id="logout-btn-settings" class="btn-auth" style="background: rgba(255, 68, 68, 0.1); color: #ff4444; border: 1px solid rgba(255, 68, 68, 0.2);">Logout Account</button>
        </section>
    </div>
</main>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    <span>Home</span>
  </a>
  <a href="chat.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span>Chats</span>
  </a>
  <a href="ai-chat.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
    <span>AI</span>
  </a>
  <a href="profile.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>Profile</span>
  </a>
  <a href="settings.html" class="nav-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82"/></svg>
    <span>Settings</span>
  </a>
</nav>

<script src="app.js" type="module"></script>
</body>
</html>
