<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Channel — Zynochat</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .channel-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding-top: 60px;
    }
    .channel-posts {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .post-card {
      background: var(--bg-1);
      border: 1px solid var(--border-1);
      border-radius: var(--radius-m);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .post-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-3);
    }
    .channel-footer {
      padding: 16px;
      background: var(--bg-1);
      border-top: 1px solid var(--border-1);
      text-align: center;
    }
  </style>
</head>
<body class="bg-0">

<header class="app-header">
  <div class="header-inner">
    <div class="header-left">
      <a href="index.html" style="display:flex; align-items:center; gap:8px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        <h1 class="app-logo-text">Official Channel</h1>
      </a>
    </div>
  </div>
</header>

<div class="channel-container">
  <div class="channel-posts">
    <div class="post-card">
      <p class="post-content">Welcome to the Zynochat Official Channel! Stay tuned for the latest updates and feature releases.</p>
      <div class="post-meta">
        <span>Jan 15, 2025</span>
        <span>👁 1.2k views</span>
      </div>
    </div>
    <div class="post-card">
      <p class="post-content">Update v2.1 is now live with enhanced AI capabilities and faster message delivery.</p>
      <div class="post-meta">
        <span>Jan 14, 2025</span>
        <span>👁 980 views</span>
      </div>
    </div>
  </div>

  <div class="channel-footer">
    <button class="btn btn-primary" style="width:100%">Join Channel</button>
  </div>
</div>

<nav class="bottom-nav">

    <span>Home</span>
  </a>

    <span>Chats</span>

    <span>AI</span>
  </a>

    <span>Profile</span>
