<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Help & Support — Zynochat</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-0">

<header class="app-header">
  <div class="header-inner">
    <div class="header-left">
      <h1 class="app-logo-text">Zyno</h1>
    </div>
    <div class="header-right">
      <a href="profile.html" class="profile-box-link" style="display: block;">
        <div class="profile-box"></div>
      </a>
    </div>
  </div>
</header>

<main style="padding: 80px 16px 100px;">
  <div class="form-wrap" style="max-width: 500px; margin: 0 auto;">
    <h2 class="form-title">Submit a Ticket</h2>
    <p class="form-sub">Describe your issue and we'll get back to you soon.</p>

    <form id="help-form">
      <div class="form-group">
        <label class="form-label" for="ticket-title">Issue Title</label>
        <input type="text" id="ticket-title" class="form-input" placeholder="What's the problem?" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="ticket-category">Category</label>
        <select id="ticket-category" class="form-select" required>
          <option value="">Select Category</option>
          <option value="login">Login Issue</option>
          <option value="chat">Chat Issue</option>
          <option value="account">Account Issue</option>
          <option value="report">Report Issue</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="ticket-desc">Description</label>
        <textarea id="ticket-desc" class="form-textarea" placeholder="Provide more details..." required></textarea>
      </div>

      <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 16px;">
        Submit Ticket
      </button>
      <p id="help-status" class="form-notice center" style="display:none;"></p>
    </form>
  </div>
</main>
