<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — Zynochat</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .admin-container {
      padding-top: var(--nav-h);
      min-height: 100vh;
      background: var(--bg-0);
    }
    .admin-content {
      padding: 40px 0;
    }
    .admin-card {
      background: var(--bg-card);
      border: 1px solid var(--border-1);
      border-radius: var(--radius-l);
      padding: 32px;
      margin-bottom: 32px;
    }
    .admin-table-wrap {
      overflow-x: auto;
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .admin-table th, .admin-table td {
      padding: 16px;
      text-align: left;
      border-bottom: 1px solid var(--border-1);
    }
    .admin-table th {
      font-family: var(--font-head);
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.1em;
      color: var(--text-3);
    }
    .admin-table tr:hover td {
      background: var(--bg-card-hover);
    }
    .btn-delete {
      background: #ff4444;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .btn-delete:hover {
      background: #cc0000;
    }
    .status-badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .status-admin {
      background: var(--accent-v-dim);
      color: var(--accent-v);
      border: 1px solid var(--border-2);
    }
  </style>
</head>
<body>

<nav class="nav scrolled">
  <div class="container">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10 2C5.58 2 2 5.58 2 10c0 1.85.6 3.56 1.6 4.95L2.05 17.5a.5.5 0 00.63.63l2.55-1.55A7.96 7.96 0 0010 18c4.42 0 8-3.58 8-8s-3.58-8-8-8zm-3 6h6a.5.5 0 010 1H7a.5.5 0 010-1zm0 2.5h4a.5.5 0 010 1H7a.5.5 0 010-1z"/></svg>
        </div>
        Zynochat <span class="status-badge status-admin" style="margin-left: 8px;">Admin</span>
      </a>
      <div id="user-profile" style="display: flex; align-items: center; gap: 12px;">
        <span id="user-name" class="contact-name" style="margin-bottom:0">Admin</span>
        <button id="logout-btn" class="btn btn-sm btn-ghost">Logout</button>
      </div>
    </div>
  </div>
</nav>

<div class="admin-container">
  <div class="container admin-content">
    <header style="margin-bottom: 32px;">
      <h1 class="section-title">Admin Control Panel</h1>
      <p class="section-sub">Manage messages and monitor platform activity.</p>
    </header>

    <div class="admin-card">
      <h2 class="card-title" style="margin-bottom: 24px;">Recent Messages</h2>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>User</th>
              <th>Message</th>
              <th>Time</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="admin-messages-body">
            <!-- Messages will be populated here -->
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="app.js" type="module"></script>
</body>
</html>
