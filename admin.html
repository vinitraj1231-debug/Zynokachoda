<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — Zynochat</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .admin-container {
      padding: 80px 16px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .stat-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    .stat-card {
      padding: 16px;
      background: var(--bg-1);
      border: 1px solid var(--border-1);
      border-radius: var(--radius-m);
      text-align: center;
    }
    .stat-val {
      font-size: 24px;
      font-weight: 800;
      color: var(--accent-v);
    }
    .stat-label {
      font-size: 12px;
      color: var(--text-3);
      text-transform: uppercase;
      font-weight: 700;
    }
    .admin-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .admin-table-wrap {
      background: var(--bg-1);
      border: 1px solid var(--border-1);
      border-radius: var(--radius-m);
      overflow-x: auto;
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .admin-table th, .admin-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid var(--border-1);
    }
    .admin-table th {
      background: var(--bg-2);
      color: var(--text-3);
      text-transform: uppercase;
      font-size: 11px;
    }
    .btn-action {
      padding: 4px 8px;
      font-size: 11px;
      border-radius: 4px;
      border: 1px solid var(--border-1);
      cursor: pointer;
    }
    .btn-ban { color: #ff4444; border-color: #ff4444; }
  </style>
</head>
<body class="bg-0">

<header class="app-header">
  <div class="header-inner">
    <div class="header-left">
      <h1 class="app-logo-text">Admin Panel</h1>
    </div>
  </div>
</header>

<main class="admin-container">
  <div class="stat-cards">
    <div class="stat-card">
      <div class="stat-val">1.2k</div>
      <div class="stat-label">Users</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">45</div>
      <div class="stat-label">Reports</div>
    </div>
  </div>

  <div class="admin-section">
    <h3 class="section-label">User Management</h3>
    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th>User</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>@vinit_raj</td>
            <td>Active</td>
            <td><button class="btn-action btn-ban">Ban</button></td>
          </tr>
          <tr>
            <td>@spammer_01</td>
            <td>Suspended</td>
            <td><button class="btn-action">Restore</button></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="admin-section">
    <h3 class="section-label">Active Banners</h3>
    <div class="form-wrap" style="padding: 20px;">
      <div class="form-group">
        <label class="form-label">Banner Text/HTML</label>
        <textarea class="form-textarea" style="min-height: 60px;">Your Ad Here</textarea>
      </div>
      <button class="btn btn-primary btn-sm">Update Banner</button>
    </div>
  </div>
</main>
